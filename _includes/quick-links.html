<!-- Quick Links Navigation - Reusable Component -->
<nav style="display: flex; flex-direction: column; gap: 0.75rem; max-width: 200px;">
    <a href="https://github.com/alexwong10" target="_blank" rel="noopener"
        style="display: inline-flex; align-items: center; gap: 0.75rem; color: #1a3a52; text-decoration: none; padding: 0.75rem; border: 1px solid #c0d9f0; border-radius: 4px; transition: all 0.2s; background: white; font-size: 0.9rem;"
        onmouseover="this.style.backgroundColor='#f0f6fa'; this.style.borderColor='#2b88d9';"
        onmouseout="this.style.backgroundColor='white'; this.style.borderColor='#c0d9f0';">
        <i class="fab fa-github" style="color: #2b88d9;"></i> GitHub
    </a>
</nav>

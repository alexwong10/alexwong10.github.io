<!-- Skills Grid - Reusable Component -->
<!-- Pass: skills (array of {title, items}) and lang ("zh" or "en") -->
<section>
    <h2
        style="font-size: 1.6rem; color: #1a3a52; margin-bottom: 1.5rem; padding-bottom: 0.75rem; border-bottom: 2px solid #2b88d9;">
        {% if include.lang == "zh" %}技能与经验{% else %}Skills & Experience{% endif %}
    </h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem;">
        {% for skill in include.skills %}
        <div style="padding-left: 1.5rem; border-left: 3px solid #2b88d9;">
            <h3 style="color: #2b88d9; font-size: 1.05rem; margin-bottom: 1rem; margin-top: 0;">{{ skill.title }}</h3>
            <ul style="list-style: none; color: #4a5568; line-height: 1.8; font-size: 0.9rem; margin: 0;">
                {% for item in skill.items %}
                <li>{{ item }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endfor %}
    </div>
</section>

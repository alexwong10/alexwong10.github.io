<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="{{ site.description }}">
    <meta name="keywords" content="{{ site.keyword }}">
    <meta name="theme-color" content="#ffffff">

    <title>{% if page.title %}{{ page.title }} - {{ site.SEOTitle }}{% else %}{{ site.SEOTitle }}{% endif %}</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ site.baseurl }}/img/favicon.ico">

    <!-- Minimal CSS -->
    <link rel="stylesheet" href="{{ " /css/minimal.css" | prepend: site.baseurl }}">

    <!-- Font Awesome -->
    <link href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" type="text/css">

    <!-- MathJax -->
    {% if page.mathjax %}
    <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      }
    };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    {% endif %}

    <!-- Language Toggle Script -->
    <script src="{{ " /js/language.js" | prepend: site.baseurl }}"></script>
</head>

<body>
    <header class="site-header">
        <nav>
            <h1 class="site-title">
                <a href="{{ " /" | prepend: site.baseurl }}">{{ site.title }}</a>
            </h1>
            <div class="header-actions">
                <button id="lang-toggle-btn-mobile" onclick="toggleSiteLanguage()" class="lang-toggle-icon" aria-label="Toggle Language">
                    <i class="fas fa-language"></i>
                </button>
                <button class="mobile-menu-toggle" onclick="toggleMobileMenu()" aria-label="Toggle Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <div class="nav-wrapper" id="nav-wrapper">
                <ul class="site-nav">
                    <li><a href="{{ " /" | prepend: site.baseurl }}" data-lang="zh">首页</a><a href="{{ " /" | prepend:
                            site.baseurl }}" data-lang="en" style="display: none;">Home</a></li>
                    <li><a href="{{ " /articles.html" | prepend: site.baseurl }}" data-lang="zh">文章</a><a href="{{ "
                            /articles.html" | prepend: site.baseurl }}" data-lang="en"
                            style="display: none;">Articles</a></li>
                    <li><a href="{{ " /about.html" | prepend: site.baseurl }}" data-lang="zh">关于</a><a href="{{ "
                            /about.html" | prepend: site.baseurl }}" data-lang="en" style="display: none;">About</a>
                    </li>
                </ul>
                <button id="lang-toggle-btn-desktop" onclick="toggleSiteLanguage()" class="lang-toggle-icon desktop-lang-icon" aria-label="Toggle Language">
                    <i class="fas fa-language"></i>
                </button>
            </div>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
